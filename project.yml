name: VirtualCharacterOS
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    INFOPLIST_FILE: VirtualCharacterOS/Resources/Info.plist

targets:
  VirtualCharacterOS:
    type: application
    platform: iOS
    sources:
      - path: VirtualCharacterOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.VirtualCharacterOS
        INFOPLIST_FILE: VirtualCharacterOS/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: VirtualCharacterOS/Resources/Info.plist
      properties:
        CFBundleName: VirtualCharacterOS
        CFBundleDisplayName: "Virtual Character OS"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
